<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science 6-Marker Hub</title>
    <link rel="stylesheet" href="style.css">

    <script defer src="https://cloud.umami.is/script.js" data-website-id="7f2b7de7-ae0b-407a-bd67-a8b2489c8e01"></script>
    
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>🚀 Science 6-Marker Hub</h1>
            <p>The only website you need to ace your EDEXCEL GCSE Board exams</p>
            <nav class="app-nav" style="margin-top: 12px; display: flex; justify-content: center; gap: 20px;">
                <a href="about.html" style="color: #38bdf8; font-weight: 600; text-decoration: none; font-size: 0.95rem; border-bottom: 2px solid transparent; transition: all 0.2s ease;" onmouseover="this.style.borderBottom='2px solid #38bdf8'" onmouseout="this.style.borderBottom='2px solid transparent'">ℹ️ About Us</a>
                <a href="contact.html" style="color: #38bdf8; font-weight: 600; text-decoration: none; font-size: 0.95rem; border-bottom: 2px solid transparent; transition: all 0.2s ease;" onmouseover="this.style.borderBottom='2px solid #38bdf8'" onmouseout="this.style.borderBottom='2px solid transparent'">✉️ Contact Us</a>
            </nav>
        </header>

        <div class="controls">
            <div class="button-group">
                <button class="btn subject-btn active" onclick="switchSubject('physics')">PHYSICS</button>
                <button class="btn subject-btn" onclick="switchSubject('chemistry')">CHEMISTRY</button>
                <button class="btn subject-btn" onclick="switchSubject('biology')">BIOLOGY</button>
            </div>

            <div class="filter-group">
                <label for="topic-filter">Filter Topic: </label>
                <select id="topic-filter" onchange="filterByTopic()">
                    <option value="All">All Topics</option>
                </select>
            </div>
        </div>

        <main class="questions-feed">
            <h2 id="feed-heading">Showing Questions</h2>
            <div id="questions-container"></div>
        </main>
    </div>

    <div id="fullscreen-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-modal-btn" onclick="closeModal()">&times;</span>
            
            <div class="modal-header">
                <span id="modal-topic" class="badge topic-badge">Topic</span>
                <span id="modal-counter" style="color: var(--text-muted); font-size: 0.9rem;">1 of 10</span>
            </div>
            
            <div class="modal-body">
                <p id="modal-text" class="question-text modal-question-text">Question content goes here...</p>
                <div id="modal-image-container"></div>
            </div>

            <div class="modal-footer">
                <button class="btn scheme-toggle-btn" onclick="toggleModalScheme()" id="modal-scheme-btn">
                    👁️ Reveal Mark Scheme
                </button>
                <div class="marking-scheme" id="modal-scheme-box" style="display: none;">
                    <ul id="modal-scheme-list"></ul>
                </div>
            </div>

            <div class="modal-nav">
                <button class="btn nav-btn" onclick="navigateModal(-1)">⬅️ Previous</button>
                <button class="btn nav-btn" onclick="navigateModal(1)">Next ➡️</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
<button id="backToTopBtn" onclick="scrollToTop()">⬆️ Back to Top</button>
</body>
</html>
